name: Diagnóstico del scraper

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Instalar Playwright
        working-directory: scraper
        run: npm i playwright@1.48.0 && npx playwright install --with-deps chromium
      - name: Diagnóstico
        working-directory: scraper
        run: node debug.js
